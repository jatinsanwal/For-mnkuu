<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Mnkuu ❤️</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff9ebb,#ffc4d6);
color:white;
text-align:center;
overflow-x:hidden;
}

/* pages */

.page{
display:none;
padding:40px 25px;
min-height:100vh;
animation:fade 1s;
}

.active{
display:block;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

/* titles */

h1{
font-size:44px;
margin-bottom:30px;
}

/* big text */

.text{
font-size:28px;
line-height:1.8;
max-width:900px;
margin:auto;
white-space:pre-line;
}

/* button */

button{
margin-top:40px;
font-size:34px;
padding:18px 55px;
border:none;
border-radius:60px;
background:#ff2e7a;
color:white;
cursor:pointer;
box-shadow:0 0 25px rgba(0,0,0,0.4);
}

button:hover{
transform:scale(1.12);
}

/* routine table */

table{
margin:auto;
margin-top:25px;
font-size:26px;
border-collapse:collapse;
background:rgba(255,255,255,0.2);
border-radius:10px;
overflow:hidden;
}

td{
padding:14px 22px;
border:1px solid white;
}

/* music button */

.music{
position:fixed;
right:15px;
top:40%;
font-size:30px;
background:#ff2e7a;
padding:15px;
border-radius:50%;
cursor:pointer;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

/* love text */

.love{
font-size:75px;
font-weight:bold;
margin-top:40px;
background:linear-gradient(90deg,#ff0000,#ff66cc,#ff0000);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* hearts */

.heart{
position:fixed;
color:#ff1f75;
animation:fall 8s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

/* petals */

.petal{
position:fixed;
width:18px;
height:18px;
background:pink;
border-radius:50% 50% 50% 0;
transform:rotate(45deg);
animation:petalfall 10s linear infinite;
}

@keyframes petalfall{
0%{transform:translateY(-10vh) rotate(0)}
100%{transform:translateY(110vh) rotate(360deg)}
}

</style>
</head>

<body>

<div class="music" onclick="toggleMusic()">🎵</div>

I LOVE YOU

<script>

let pages=document.querySelectorAll(".page")
let current=0

function nextPage(){
pages[current].classList.remove("active")
current++
pages[current].classList.add("active")
}

/* typing */

function type(text,id,speed=20){
let i=0
let el=document.getElementById(id)
el.innerHTML=""

function typing(){
if(i<text.length){
el.innerHTML+=text.charAt(i)
i++
setTimeout(typing,speed)
}
}
typing()
}

/* music */

let song=document.getElementById("song")

function toggleMusic(){
if(song.paused){
song.play()
}else{
song.pause()
}
}

/* hearts */

setInterval(()=>{
let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"
heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=Math.random()*30+20+"px"
document.body.appendChild(heart)
setTimeout(()=>heart.remove(),8000)
},300)

/* petals */

setInterval(()=>{
let petal=document.createElement("div")
petal.className="petal"
petal.style.left=Math.random()*100+"vw"
document.body.appendChild(petal)

},500)

</script>

</body>
</html>
